<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محطة الدراسة</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Arial', sans-serif; }
        .screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #007bff; color: white; }
        .hidden { display: none; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; border: none; border-radius: 8px; margin: 10px; background: white; color: #007bff; font-weight: bold; }
        h1 { font-size: 3rem; }
    </style>
</head>
<body>

    <!-- Section 1: Welcome -->
    <div id="screen1" class="screen">
        <h1>مرحبا بك في محطة الدراسة!</h1>
        <button onclick="showScreen('screen2')">ابدأ</button>
    </div>

    <!-- Section 2: Grade Selection -->
    <div id="screen2" class="screen hidden">
        <h1>صف كم؟</h1>
        <div>
            <button>خامس</button>
            <button>سادس</button>
            <button>سابع</button>
            <button>ثامن</button>
            <button>تاسع</button>
            <button>عاشر</button>
        </div>
    </div>

    <script>
        function showScreen(screenId) {
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.remove('hidden');
        }
    </script>
</body>
</html>
