<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محطة الدراسة المتكاملة</title>
    <style>
        :root { --soft-blue: #a8d8ea; --paper-bg: #fffcf2; --accent: #ffb7b2; --text: #444; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--soft-blue); min-height: 100vh; display: flex; flex-direction: column; align-items: center; color: var(--text); }
        
        .screen { display: none; opacity: 0; transition: opacity 0.6s ease-in-out; padding: 20px; width: 100%; flex-direction: column; align-items: center; box-sizing: border-box; }
        .active { display: flex; opacity: 1; }
        
        .btn { background: white; border: 2px solid var(--accent); padding: 15px 30px; border-radius: 20px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin: 10px; width: 80%; max-width: 350px; box-shadow: 4px 4px 0px var(--accent); transition: 0.3s; }
        .btn:hover { background: var(--accent); color: white; }
        
        .card { background: var(--paper-bg); padding: 20px; margin: 10px; border-radius: 30px; width: 90%; max-width: 500px; box-shadow: 8px 8px 15px rgba(0,0,0,0.1); border: 1px solid #eee; text-align: center; }
        
        h1, h2 { font-size: 1.6rem; color: #333; }
        input { padding: 10px; border-radius: 15px; border: 2px solid var(--soft-blue); width: 80px; text-align: center; font-size: 1.2rem; margin: 10px; }
        nav { background: rgba(255,255,255,0.8); padding: 10px; width: 90%; display: flex; justify-content: space-around; border-radius: 20px; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Screen 1: Home -->
    <div id="screen1" class="screen active">
        <h1>مرحباً بك في محطة الدراسة</h1>
        <button class="btn" onclick="goTo('screen2')">ابدأ الرحلة</button>
    </div>

    <!-- Screen 2: Grades -->
    <div id="screen2" class="screen">
        <h1>اختر صفك الدراسي</h1>
        <div id="grades" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <button class="btn" onclick="goTo('screen1')">رجوع</button>
    </div>

    <!-- Screen 3: Subjects -->
    <div id="screen3" class="screen">
        <h2 id="gradeTitle"></h2>
        <div id="subjects" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <button class="btn" onclick="goTo('screen2')">رجوع</button>
    </div>

    <!-- Screen 4: Dashboard -->
    <div id="screen4" class="screen">
        <nav>
            <span style="cursor:pointer" onclick="goTo('screenTimer')">المؤقت</span>
            <span style="cursor:pointer" onclick="showProgress()">التقدم</span>
            <span id="streakDisplay">الستريك: 0</span>
        </nav>
        <div class="card">
            <h2 id="dashTitle"></h2>
            <button class="btn" style="background:var(--accent);" onclick="goTo('screenTimer')">ابدأ الدرس</button>
        </div>
        <button class="btn" onclick="goTo('screen3')">رجوع</button>
    </div>

    <!-- Screen 5: Timer -->
    <div id="screenTimer" class="screen">
        <div class="card">
            <h1>مؤقت الدرس</h1>
            <input type="number" id="timerInput" value="25"> دقيقة
            <div>
                <button class="btn" onclick="startTimer()">ابدأ</button>
                <button class="btn" onclick="stopTimer()">إيقاف</button>
            </div>
            <h2 id="timeRemaining">00:00</h2>
            
            <!-- Audio Controls -->
            <button class="btn" onclick="document.getElementById('audioPlayer').play()">تفعيل الصوت (اضغط هنا أولاً)</button>
            <select id="soundSelect" onchange="loadSound()" class="btn">
                <option value="">اختر صوتاً...</option>
                <option value="https://actions.google.com/sounds/v1/weather/rain_heavy_wind.ogg">مطر</option>
                <option value="https://actions.google.com/sounds/v1/household/fireplace.ogg">مدفأة</option>
                <option value="https://actions.google.com/sounds/v1/nature/ocean_waves.ogg">شاطئ</option>
                <option value="https://actions.google.com/sounds/v1/nature/birds_in_forest.ogg">صباح</option>
            </select>
            
            <button class="btn" onclick="goTo('screen4')">رجوع</button>
        </div>
    </div>

    <!-- Screen 6: Progress -->
    <div id="screenProgress" class="screen">
        <div class="card">
            <h1>سجل التقدم</h1>
            <div id="progressList" style="width:100%; text-align:right;"></div>
            <button class="btn" onclick="goTo('screen4')">رجوع</button>
        </div>
    </div>

    <audio id="audioPlayer" loop></audio>

    <script>
        let state = JSON.parse(localStorage.getItem('studyState')) || { streak: 0, progress: {}, goals: {}, challenges: {} };
        let currentSub = "", timerInterval = null;

        function goTo(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        function selectGrade(g) {
            document.getElementById('gradeTitle').innerText = g;
            let subs = (g === "تاسع" || g === "عاشر") ? ["عربي", "إسلامية", "رياضيات", "فيزياء", "كيمياء", "أحياء", "إنجليزي", "دراسات"] : ["عربي", "إسلامية", "رياضيات", "علوم", "إنجليزي", "دراسات"];
            document.getElementById('subjects').innerHTML = "";
            subs.forEach(s => {
                if(!state.progress[s]) state.progress[s] = 0;
                document.getElementById('subjects').innerHTML += `<button class="btn" onclick="startSub('${s}')">${s}</button>`;
            });
            goTo('screen3');
        }

        function startSub(s) { currentSub = s; document.getElementById('dashTitle').innerText = s; goTo('screen4'); }

        function startTimer() {
            stopTimer();
            let time = document.getElementById('timerInput').value * 60;
            timerInterval = setInterval(() => {
                time--;
                document.getElementById('timeRemaining').innerText = Math.floor(time/60) + ":" + (time%60).toString().padStart(2, '0');
                if(time <= 0) { 
                    clearInterval(timerInterval); 
                    state.streak++; state.progress[currentSub]++;
                    localStorage.setItem('studyState', JSON.stringify(state)); 
                    document.getElementById('streakDisplay').innerText = "الستريك: " + state.streak;
                    alert("انتهى الوقت! تم احتساب الدرس.");
                    goTo('screen4');
                }
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); }
        function loadSound() { let p = document.getElementById('audioPlayer'); p.src = document.getElementById('soundSelect').value; p.play(); }
        
        function showProgress() {
            let list = document.getElementById('progressList');
            list.innerHTML = "";
            let vals = Object.values(state.progress);
            let max = vals.length > 0 ? Math.max(...vals) : 0;
            for(let s in state.progress) {
                let warn = (max > 0 && state.progress[s] < max - 2) ? "<br><span style='color:red;'>ملاحظة: تحتاج مراجعة!</span>" : "";
                list.innerHTML += `<div style='padding:10px; border-bottom:1px solid #ccc;'><strong>${s}:</strong> ${state.progress[s]} دروس منجزة ${warn}</div>`;
            }
            goTo('screenProgress');
        }

        ["خامس", "سادس", "سابع", "ثامن", "تاسع", "عاشر"].forEach(g => document.getElementById('grades').innerHTML += `<button class="btn" onclick="selectGrade('${g}')">${g}</button>`);
    </script>
</body>
</html>
