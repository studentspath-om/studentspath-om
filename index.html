<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محطة الدراسة</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #007bff; font-family: sans-serif; }
        .container { text-align: center; width: 90%; display: none; opacity: 0; transition: opacity 0.5s ease; }
        .active { display: block; opacity: 1; }
        h1 { color: white; }
        
        /* Layout */
        .main-layout { display: flex; flex-direction: row-reverse; justify-content: center; gap: 20px; align-items: flex-start; margin-top: 20px; }
        .left-col { display: flex; flex-direction: column; gap: 10px; width: 200px; }
        .right-col { display: flex; flex-direction: column; align-items: center; width: 250px; }

        .btn { background-color: yellow; color: black; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .lesson-btn { padding: 30px 10px; font-size: 1.2rem; background-color: #ffcc00; border: 3px solid #ff9900; }
        .back-btn { background-color: #ffcccc; }
        
        .timer-display { color: white; font-size: 3rem; margin: 10px; }
        input { width: 60px; padding: 8px; font-size: 1rem; text-align: center; border-radius: 5px; border: none; }
        table { width: 100%; border-collapse: collapse; color: white; margin-top: 20px; font-size: 0.9rem; }
        th, td { border: 1px solid white; padding: 8px; }
        .reward-card { margin: 10px; padding: 10px; border: 2px solid white; border-radius: 10px; display: inline-block; }
        .reward-img { width: 100px; height: 100px; object-fit: cover; }
    </style>
</head>
<body>

    <!-- ... (Screens 1, 2, and Subjects remain the same) ... -->
    <div id="screen1" class="container active">
        <h1>مرحباً بك في محطة الدراسة!</h1>
        <button class="btn" onclick="showScreen('screen2')">ابدأ</button>
    </div>

    <div id="screen2" class="container">
        <h1>صف كم؟</h1>
        <button class="btn" onclick="setGrade('5-8')">خامس الى ثامن</button>
        <button class="btn" onclick="setGrade('9-10')">تاسع وعاشر</button>
    </div>

    <div id="subjects-screen" class="container">
        <h1>اختر المادة</h1>
        <div id="sub-list"></div>
    </div>

    <div id="dashboard" class="container">
        <h1 id="currentSubjectTitle"></h1>
        <div style="color: white; margin-bottom: 10px;">دروس المعلم: <input type="number" id="teacherLessonsInput" onchange="saveTeacherLessons()"></div>
        <div style="color: white;">ضبط الوقت: <input type="number" id="timerInput" value="25" onchange="resetTimer()"></div>
        <div class="timer-display" id="timer">25:00</div>
        
        <div class="main-layout">
            <!-- Left: Buttons -->
            <div class="left-col">
                <button class="btn" onclick="startTimer()">ابدأ</button>
                <button class="btn" onclick="stopTimer()">إيقاف</button>
                <button class="btn" onclick="resetTimer()">إعادة تعيين</button>
                <button class="btn" onclick="updateProgressTable(); showScreen('progress');">التقدم</button>
                <button class="btn" onclick="updateRewardsScreen(); showScreen('rewardsScreen');">الجوائز</button>
                <button class="btn back-btn" onclick="showScreen('subjects-screen')">رجوع</button>
            </div>
            <!-- Right: Lesson Button -->
            <div class="right-col" id="lessonArea">
                <button id="lessonBtn" class="btn lesson-btn" onclick="confirmLesson()">1 درس تم الانتهاء منه</button>
            </div>
        </div>
    </div>

    <!-- ... (Progress & Rewards Screens remain the same) ... -->
    <div id="progress" class="container"><h1>التقدم</h1><table id="progressTable"></table><button class="btn back-btn" onclick="showScreen('dashboard')">رجوع</button></div>
    <div id="rewardsScreen" class="container"><h1>الجوائز</h1><div id="rewardsList"></div><button class="btn back-btn" onclick="showScreen('dashboard')">رجوع</button></div>

    <script>
        let currentSubject = ""; let globalLessons = 0; let timerId = null; let timeLeft = 25 * 60;
        let data = {}; ["رياضيات", "إسلامية", "عربي", "دراسات", "علوم", "إنجليزي", "فيزياء", "كيمياء", "أحياء"].forEach(s => data[s] = { mine: 0, teacher: 0 });

        function showScreen(id) {
            document.querySelectorAll('.container').forEach(d => { d.classList.remove('active'); d.style.display = 'none'; });
            let target = document.getElementById(id); target.style.display = 'block'; setTimeout(() => target.classList.add('active'), 50);
        }

        function setGrade(grade) {
            let list = document.getElementById('sub-list'); list.innerHTML = "";
            let all = {"5-8": ["رياضيات", "إسلامية", "عربي", "دراسات", "علوم", "إنجليزي"], "9-10": ["رياضيات", "إسلامية", "عربي", "دراسات", "فيزياء", "كيمياء", "أحياء", "إنجليزي"]};
            all[grade].forEach(s => {
                let b = document.createElement('button'); b.className = "btn"; b.innerText = s;
                b.onclick = () => { currentSubject = s; document.getElementById('currentSubjectTitle').innerText = s; document.getElementById('teacherLessonsInput').value = data[s].teacher; showScreen('dashboard'); };
                list.appendChild(b);
            });
            showScreen('subjects-screen');
        }

        function confirmLesson() {
            let area = document.getElementById('lessonArea');
            area.innerHTML = `
                <p style="color:white">هل انت متأكد انك انهيت درس واحد؟</p>
                <button class="btn" style="background:green; color:white" onclick="completeLesson(true)">نعم</button>
                <button class="btn back-btn" onclick="completeLesson(false)">لا</button>
            `;
        }

        function completeLesson(yes) {
            if(yes) { data[currentSubject].mine++; globalLessons++; alert("تم تسجيل الدرس!"); }
            document.getElementById('lessonArea').innerHTML = `<button id="lessonBtn" class="btn lesson-btn" onclick="confirmLesson()">1 درس تم الانتهاء منه</button>`;
        }

        // ... (Keep existing Timer, Progress, and Rewards logic) ...
        function startTimer() { if(!timerId) timerId = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = Math.floor(timeLeft/60) + ":" + (timeLeft%60).toString().padStart(2, '0'); if(timeLeft <= 0) { clearInterval(timerId); timerId = null; alert("انتهى!"); } }, 1000); }
        function stopTimer() { clearInterval(timerId); timerId = null; }
        function resetTimer() { stopTimer(); timeLeft = document.getElementById('timerInput').value * 60; document.getElementById('timer').innerText = document.getElementById('timerInput').value + ":00"; }
        function saveTeacherLessons() { data[currentSubject].teacher = document.getElementById('teacherLessonsInput').value; }
        function updateProgressTable() { /* ... */ }
        function updateRewardsScreen() { /* ... */ }
    </script>
</body>
</html>
