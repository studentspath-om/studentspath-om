<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محطة الدراسة المتكاملة</title>
    <style>
        :root { --soft-blue: #a8d8ea; --paper-bg: #fffcf2; --accent: #ffb7b2; --text: #333; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--soft-blue); min-height: 100vh; display: flex; flex-direction: column; align-items: center; color: var(--text); }
        .screen { display: none; opacity: 0; transition: opacity 0.5s; padding: 40px; width: 100%; flex-direction: column; align-items: center; }
        .active { display: flex; opacity: 1; }
        
        .btn { background: white; border: 4px solid var(--accent); padding: 40px 80px; border-radius: 50px; font-weight: bold; font-size: 2.5rem; cursor: pointer; margin: 20px; width: 90%; max-width: 800px; box-shadow: 10px 10px 0px var(--accent); text-align: center; }
        .btn:hover { background: var(--accent); color: white; }
        
        .card { background: var(--paper-bg); padding: 50px; margin: 30px; border-radius: 60px; width: 95%; max-width: 1000px; box-shadow: 20px 20px 40px rgba(0,0,0,0.1); text-align: center; }
        
        h1, h2, h3 { font-size: 3.5rem; color: #222; }
        input { padding: 30px; border-radius: 30px; border: 4px solid var(--soft-blue); width: 300px; text-align: center; font-size: 3rem; }
        
        .editable { border-bottom: 3px dashed #777; min-height: 150px; padding: 20px; font-size: 2.5rem; text-align: right; background: #fffdfa; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- S1: Home -->
    <div id="screen1" class="screen active" onclick="unlockAudio()">
        <h1>مرحباً بك في مساحتك</h1>
        <button class="btn" onclick="goTo('screen2')">ابدأ الرحلة</button>
    </div>

    <!-- S2: Grades -->
    <div id="screen2" class="screen">
        <h1>اختر صفك</h1>
        <div id="grades" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <button class="btn" onclick="goTo('screen1')">رجوع</button>
    </div>

    <!-- S3: Subjects -->
    <div id="screen3" class="screen">
        <h2 id="gradeTitle"></h2>
        <div id="subjects" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <button class="btn" onclick="goTo('screen2')">رجوع</button>
    </div>

    <!-- S4: Dashboard -->
    <div id="screen4" class="screen">
        <div class="card">
            <h3>هدف الفصل الدراسي</h3>
            <div contenteditable="true" class="editable" style="font-size: 4rem; text-align: center;">95%</div>
        </div>
        <div style="display:flex; flex-wrap:wrap; justify-content:center; width: 100%;">
            <div class="card"><h3>أهداف اليوم</h3><div contenteditable="true" class="editable">1.<br>2.<br>3.</div></div>
            <div class="card"><h3>أهداف الأسبوع</h3><div contenteditable="true" class="editable">1.<br>2.<br>3.</div></div>
            <div class="card"><h3>أهداف الشهر</h3><div contenteditable="true" class="editable">1.<br>2.<br>3.</div></div>
        </div>
        <button class="btn" style="background:#a8d8ea" onclick="goTo('screenTimer')">ابدأ الدرس الآن</button>
        <button class="btn" onclick="goTo('screen3')">رجوع</button>
    </div>

    <!-- S5: Timer -->
    <div id="screenTimer" class="screen">
        <div class="card">
            <h1>المؤقت</h1>
            <input type="number" id="timerInput" value="25">
            <button class="btn" onclick="startTimer()">ابدأ العمل</button>
            <h2 id="timeRemaining" style="font-size: 6rem;">00:00</h2>
            <select id="soundSelect" onchange="loadAndPlaySound()" class="btn">
                <option value="">اختر صوتاً للمذاكرة...</option>
                <option value="https://actions.google.com/sounds/v1/weather/rain_heavy_wind.ogg">صوت المطر</option>
                <option value="https://actions.google.com/sounds/v1/household/fireplace.ogg">صوت المدفأة</option>
            </select>
            <button class="btn" onclick="goTo('screen4')">رجوع</button>
        </div>
    </div>

    <audio id="audioPlayer" loop></audio>

    <script>
        // Force audio unlock on first interaction
        function unlockAudio() {
            let p = document.getElementById('audioPlayer');
            p.play().then(() => p.pause()).catch(e => console.log("Waiting for user gesture"));
        }

        function goTo(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }

        function loadAndPlaySound() {
            let p = document.getElementById('audioPlayer');
            p.src = document.getElementById('soundSelect').value;
            p.play().catch(e => alert("يرجى الضغط في أي مكان على الشاشة أولاً لتفعيل الصوت."));
        }

        function selectGrade(g) {
            document.getElementById('gradeTitle').innerText = g;
            let subs = ["عربي", "رياضيات", "علوم", "إنجليزي"];
            document.getElementById('subjects').innerHTML = "";
            subs.forEach(s => document.getElementById('subjects').innerHTML += `<button class="btn" onclick="goTo('screen4')">${s}</button>`);
            goTo('screen3');
        }

        function startTimer() {
            let time = document.getElementById('timerInput').value * 60;
            let i = setInterval(() => {
                time--;
                document.getElementById('timeRemaining').innerText = Math.floor(time/60) + ":" + (time%60).toString().padStart(2, '0');
                if(time <= 0) { clearInterval(i); alert("انتهى وقت المذاكرة!"); }
            }, 1000);
        }

        ["خامس", "سادس", "سابع", "ثامن", "تاسع", "عاشر"].forEach(g => document.getElementById('grades').innerHTML += `<button class="btn" onclick="selectGrade('${g}')">${g}</button>`);
    </script>
</body>
</html>
