<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام صندوق لايتنر</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --text: #f8fafc;
      --text-dim: #94a3b8;
      --success: #22c55e;
      --danger: #ef4444;
      --border: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 { font-size: 1.8rem; color: var(--accent); margin-bottom: 5px; }
    p.subtitle { color: var(--text-dim); font-size: 0.9rem; }

    /* Filter Bar */
    .filter-container {
      width: 100%;
      max-width: 500px;
      margin-bottom: 15px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .filter-container label { font-size: 0.9rem; color: var(--text-dim); }

    /* Box Stats Bar */
    .boxes-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 20px;
    }

    .box-stat {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 5px;
      text-align: center;
    }

    .box-stat .title { font-size: 0.75rem; color: var(--text-dim); display: block; }
    .box-stat .count { font-size: 1.2rem; font-weight: bold; color: var(--accent); }

    /* Flashcard Container */
    .card-container {
      width: 100%;
      max-width: 500px;
      perspective: 1000px;
      margin-bottom: 20px;
    }

    .flashcard {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-height: 220px;
      padding: 25px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: pointer;
      position: relative;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }

    .flashcard:active { transform: scale(0.98); }

    .card-label {
      position: absolute;
      top: 12px;
      right: 15px;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .card-subject {
      position: absolute;
      top: 12px;
      left: 15px;
      font-size: 0.75rem;
      color: var(--accent);
      background: rgba(56, 189, 248, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--accent);
    }

    .card-content { font-size: 1.25rem; font-weight: 500; word-break: break-word; line-height: 1.6; }

    /* Controls */
    .controls {
      display: flex;
      gap: 15px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 30px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.9; }

    .btn-wrong { background-color: var(--danger); color: white; }
    .btn-correct { background-color: var(--success); color: white; }
    .btn-flip { background-color: var(--accent); color: #000; }

    /* Add Card Section */
    .add-section {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 12px;
    }

    .add-section h2 { font-size: 1.1rem; margin-bottom: 12px; color: var(--accent); }

    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 0.95rem;
    }

    textarea { resize: vertical; min-height: 60px; }

    .btn-add { background: var(--accent); color: #000; width: 100%; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header>
    <h1>نظام صندوق لايتنر</h1>
    <p class="subtitle">بطاقات الاستذكار المتباعد</p>
  </header>

  <!-- Subject Filter -->
  <div class="filter-container">
    <label for="filter-subject">تصفية حسب المادة:</label>
    <select id="filter-subject" onchange="getNextCard()">
      <option value="ALL">جميع المواد</option>
      <option value="الرياضيات">الرياضيات</option>
      <option value="الفيزياء">الفيزياء</option>
      <option value="الأحياء">الأحياء</option>
      <option value="الكيمياء">الكيمياء</option>
      <option value="الدراسات الاجتماعية">الدراسات الاجتماعية</option>
      <option value="التربية الإسلامية">التربية الإسلامية</option>
      <option value="اللغة العربية">اللغة العربية</option>
    </select>
  </div>

  <!-- Box Counters -->
  <div class="boxes-container">
    <div class="box-stat"><span class="title">الصندوق 1</span><span class="count" id="count-1">0</span></div>
    <div class="box-stat"><span class="title">الصندوق 2</span><span class="count" id="count-2">0</span></div>
    <div class="box-stat"><span class="title">الصندوق 3</span><span class="count" id="count-3">0</span></div>
    <div class="box-stat"><span class="title">الصندوق 4</span><span class="count" id="count-4">0</span></div>
    <div class="box-stat"><span class="title">الصندوق 5</span><span class="count" id="count-5">0</span></div>
  </div>

  <!-- Flashcard Display Area -->
  <div class="card-container">
    <div class="flashcard" id="card" onclick="flipCard()">
      <span class="card-label" id="card-tag">الوجه الأول</span>
      <span class="card-subject hidden" id="card-subject-tag"></span>
      <div class="card-content" id="card-text">أضف بطاقتك الأولى بالأسفل للبدء في المراجعة!</div>
    </div>
  </div>

  <!-- Response Controls -->
  <div class="controls hidden" id="action-controls">
    <button class="btn-wrong" onclick="processAnswer(false)">خطأ (إعادة للصندوق 1)</button>
    <button class="btn-correct" onclick="processAnswer(true)">صحيح (ترقية للصندوق التالي)</button>
  </div>
  <div class="controls" id="flip-control">
    <button class="btn-flip" onclick="flipCard()">إظهار الإجابة</button>
  </div>

  <!-- New Card Input Form -->
  <div class="add-section">
    <h2>إضافة بطاقة جديدة</h2>
    <select id="add-subject">
      <option value="الرياضيات">الرياضيات</option>
      <option value="الفيزياء">الفيزياء</option>
      <option value="الأحياء">الأحياء</option>
      <option value="الكيمياء">الكيمياء</option>
      <option value="الدراسات الاجتماعية">الدراسات الاجتماعية</option>
      <option value="التربية الإسلامية">التربية الإسلامية</option>
      <option value="اللغة العربية">اللغة العربية</option>
    </select>
    <input type="text" id="front-input" placeholder="السؤال أو المفهوم (الوجه الأول)">
    <textarea id="back-input" placeholder="الإجابة أو الشرح (الوجه الثاني)"></textarea>
    <button class="btn-add" onclick="addCard()">حفظ في الصندوق 1</button>
  </div>

  <script>
    let cards = JSON.parse(localStorage.getItem('leitner_cards')) || [];
    let currentCardIndex = -1;
    let showingFront = true;

    // Save cards and state instantly
    function saveState() {
      localStorage.setItem('leitner_cards', JSON.stringify(cards));
      localStorage.setItem('leitner_filter', document.getElementById('filter-subject').value);
      localStorage.setItem('leitner_draft_front', document.getElementById('front-input').value);
      localStorage.setItem('leitner_draft_back', document.getElementById('back-input').value);
      updateCounts();
    }

    function restoreState() {
      const savedFilter = localStorage.getItem('leitner_filter');
      if (savedFilter) document.getElementById('filter-subject').value = savedFilter;

      const draftFront = localStorage.getItem('leitner_draft_front');
      if (draftFront) document.getElementById('front-input').value = draftFront;

      const draftBack = localStorage.getItem('leitner_draft_back');
      if (draftBack) document.getElementById('back-input').value = draftBack;
    }

    function getFilteredCards() {
      const selectedSubject = document.getElementById('filter-subject').value;
      if (selectedSubject === 'ALL') return cards;
      return cards.filter(c => c.subject === selectedSubject);
    }

    function updateCounts() {
      const activeCards = getFilteredCards();
      for (let i = 1; i <= 5; i++) {
        const count = activeCards.filter(c => c.box === i).length;
        document.getElementById(`count-${i}`).textContent = count;
      }
    }

    function getNextCard() {
      const activeCards = getFilteredCards();

      if (activeCards.length === 0) {
        document.getElementById('card-text').textContent = "لا توجد بطاقات متاحة لهذه المادة. أضف بطاقة جديدة بالأسفل!";
        document.getElementById('card-tag').textContent = "فارغ";
        document.getElementById('card-subject-tag').classList.add('hidden');
        document.getElementById('flip-control').classList.add('hidden');
        document.getElementById('action-controls').classList.add('hidden');
        currentCardIndex = -1;
        saveState();
        return;
      }

      activeCards.sort((a, b) => a.box - b.box);
      const targetCard = activeCards[0];
      currentCardIndex = cards.findIndex(c => c === targetCard);

      showingFront = true;
      saveState();
      renderCard();
    }

    function renderCard() {
      if (currentCardIndex === -1 || cards.length === 0) return;
      
      const currentCard = cards[currentCardIndex];
      document.getElementById('card-tag').textContent = showingFront ? `الصندوق ${currentCard.box} • الوجه الأول` : `الصندوق ${currentCard.box} • الوجه الثاني`;
      
      const subjectTag = document.getElementById('card-subject-tag');
      subjectTag.textContent = currentCard.subject || "عام";
      subjectTag.classList.remove('hidden');

      document.getElementById('card-text').textContent = showingFront ? currentCard.front : currentCard.back;

      if (showingFront) {
        document.getElementById('flip-control').classList.remove('hidden');
        document.getElementById('action-controls').classList.add('hidden');
      } else {
        document.getElementById('flip-control').classList.add('hidden');
        document.getElementById('action-controls').classList.remove('hidden');
      }
    }

    function flipCard() {
      if (currentCardIndex === -1 || cards.length === 0) return;
      showingFront = !showingFront;
      renderCard();
    }

    function processAnswer(isCorrect) {
      if (currentCardIndex === -1) return;

      if (isCorrect) {
        if (cards[currentCardIndex].box < 5) {
          cards[currentCardIndex].box += 1;
        }
      } else {
        cards[currentCardIndex].box = 1; 
      }

      saveState();
      getNextCard();
    }

    function addCard() {
      const subject = document.getElementById('add-subject').value;
      const front = document.getElementById('front-input').value.trim();
      const back = document.getElementById('back-input').value.trim();

      if (!front || !back) {
        alert('يرجى ملء خانة السؤال وخانة الإجابة.');
        return;
      }

      cards.push({ subject, front, back, box: 1 });
      
      document.getElementById('front-input').value = '';
      document.getElementById('back-input').value = '';

      saveState();
      getNextCard();
    }

    // Auto-save mechanisms on exit or typing
    window.addEventListener('beforeunload', saveState);
    document.getElementById('front-input').addEventListener('input', saveState);
    document.getElementById('back-input').addEventListener('input', saveState);

    // Initial load
    restoreState();
    getNextCard();
  </script>
</body>
</html>
