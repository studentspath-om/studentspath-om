<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محطة الدراسة</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #007bff; font-family: sans-serif; }
        .container { text-align: center; width: 90%; display: none; }
        .active { display: block; }
        h1 { color: white; }
        .btn { background-color: yellow; color: black; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; width: 80%; max-width: 300px; display: block; margin-left: auto; margin-right: auto; }
        .back-btn { background-color: #ffcccc; margin-top: 20px; }
        .timer-display { color: white; font-size: 3rem; margin: 20px; }
        input { width: 60px; padding: 5px; font-size: 1rem; text-align: center; }
        table { width: 100%; border-collapse: collapse; color: white; margin-top: 20px; }
        th, td { border: 1px solid white; padding: 8px; }
        .reward-card { margin: 10px; padding: 10px; border: 2px solid white; border-radius: 10px; display: inline-block; }
        .reward-img { width: 100px; height: 100px; object-fit: cover; }
    </style>
</head>
<body>

    <!-- 1: Home -->
    <div id="screen1" class="container active">
        <h1>مرحباً بك في محطة الدراسة!</h1>
        <button class="btn" onclick="showScreen('screen2')">ابدأ</button>
    </div>

    <!-- 2: Grade Selection -->
    <div id="screen2" class="container">
        <h1>صف كم؟</h1>
        <button class="btn" onclick="showScreen('subjects5-8')">خامس الى ثامن</button>
        <button class="btn" onclick="showScreen('subjects9-10')">تاسع وعاشر</button>
        <button class="btn back-btn" onclick="showScreen('screen1')">رجوع</button>
    </div>

    <!-- 3: Subjects 5-8 -->
    <div id="subjects5-8" class="container">
        <h1>اختر المادة (خامس-ثامن)</h1>
        <button class="btn" onclick="showScreen('dashboard')">رياضيات</button>
        <button class="btn" onclick="showScreen('dashboard')">إسلامية</button>
        <button class="btn" onclick="showScreen('dashboard')">عربي</button>
        <button class="btn" onclick="showScreen('dashboard')">دراسات</button>
        <button class="btn" onclick="showScreen('dashboard')">علوم</button>
        <button class="btn" onclick="showScreen('dashboard')">إنجليزي</button>
        <button class="btn back-btn" onclick="showScreen('screen2')">رجوع</button>
    </div>

    <!-- 4: Subjects 9-10 -->
    <div id="subjects9-10" class="container">
        <h1>اختر المادة (تاسع-عاشر)</h1>
        <button class="btn" onclick="showScreen('dashboard')">رياضيات</button>
        <button class="btn" onclick="showScreen('dashboard')">إسلامية</button>
        <button class="btn" onclick="showScreen('dashboard')">عربي</button>
        <button class="btn" onclick="showScreen('dashboard')">دراسات</button>
        <button class="btn" onclick="showScreen('dashboard')">فيزياء</button>
        <button class="btn" onclick="showScreen('dashboard')">كيمياء</button>
        <button class="btn" onclick="showScreen('dashboard')">أحياء</button>
        <button class="btn" onclick="showScreen('dashboard')">إنجليزي</button>
        <button class="btn back-btn" onclick="showScreen('screen2')">رجوع</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="container">
        <h1>لوحة تحكم المادة</h1>
        <div>
            <label style="color: white;">وقت التركيز:</label>
            <input type="number" id="focusTime" value="25">
            <label style="color: white;">وقت الاستراحة:</label>
            <input type="number" id="breakTime" value="5">
        </div>
        <div class="timer-display" id="timer">25:00</div>
        <button class="btn" onclick="startTimer()">ابدأ</button>
        <button class="btn" onclick="stopTimer()">إيقاف</button>
        <button class="btn" onclick="resetTimer()">إعادة تعيين</button>
        <br>
        <button class="btn" onclick="addLesson()">1 درس تم الانتهاء منه</button>
        <div style="color: white; font-size: 1.2rem;">إجمالي الدروس المنجزة: <span id="lessonCount">0</span></div>
        <br>
        <button class="btn" onclick="showScreen('progress')">التقدم</button>
        <button class="btn" onclick="updateRewardsScreen()">الجوائز</button>
        <button class="btn back-btn" onclick="showScreen('screen2')">رجوع</button>
    </div>

    <!-- Progress Screen -->
    <div id="progress" class="container">
        <h1>مستوى التقدم</h1>
        <table>
            <tr><th>المادة</th><th>دروسك</th><th>دروس المعلم</th></tr>
            <tr><td>المادة المختارة</td><td id="myLessons">0</td><td>8</td></tr>
        </table>
        <p id="alertMsg" style="color: yellow; font-weight: bold;"></p>
        <button class="btn back-btn" onclick="showScreen('dashboard')">رجوع</button>
    </div>

    <!-- Rewards Screen -->
    <div id="rewardsScreen" class="container">
        <h1>الجوائز</h1>
        <div id="rewardsList"></div>
        <button class="btn back-btn" onclick="showScreen('dashboard')">رجوع</button>
    </div>

    <script>
        let timeLeft = 25 * 60;
        let timerId = null;
        let lessons = 0;
        const rewards = [
            { name: "triple T", lessonsRequired: 10, image: "https://i.pinimg.com/736x/f1/3b/d2/f13bd27b74291818995a189fcced5693.jpg" },
            { name: "cat", lessonsRequired: 20, image: "https://i.pinimg.com/736x/b2/82/66/b28266e613ba53221b1ca4c8c5cbac04.jpg" },
            { name: "haaland", lessonsRequired: 40, image: "https://i.pinimg.com/736x/d2/8d/72/d28d724a39e65d17b07cd43064047634.jpg" },
            { name: "timebomb", lessonsRequired: 100, image: "https://i.pinimg.com/736x/45/ad/8f/45ad8fdefdc24c2ca7221398c63a0e4c.jpg" }
        ];

        function showScreen(screenId) {
            document.querySelectorAll('.container').forEach(div => div.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function updateDisplay() {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function startTimer() {
            if (timerId) return;
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) { clearInterval(timerId); timerId = null; alert("انتهى الوقت!"); }
            }, 1000);
        }

        function stopTimer() { clearInterval(timerId); timerId = null; }

        function resetTimer() { stopTimer(); timeLeft = document.getElementById('focusTime').value * 60; updateDisplay(); }

        function addLesson() {
            lessons++;
            document.getElementById('lessonCount').innerText = lessons;
            document.getElementById('myLessons').innerText = lessons;
            if (lessons < 8) document.getElementById('alertMsg').innerText = "هذه المادة قد تحتاج الى دراسة!";
            else document.getElementById('alertMsg').innerText = "";
            rewards.forEach(r => { if (lessons === r.lessonsRequired) alert("مبروك! فتحت شخصية: " + r.name); });
        }

        function updateRewardsScreen() {
            let list = document.getElementById('rewardsList');
            list.innerHTML = "";
            rewards.forEach(r => {
                let div = document.createElement('div');
                div.className = "reward-card";
                if (lessons >= r.lessonsRequired) {
                    div.innerHTML = `<img src="${r.image}" class="reward-img"><p>${r.name}</p>`;
                } else {
                    div.innerHTML = `<p>${r.name} (مقفل - ${r.lessonsRequired} درس)</p>`;
                }
                list.appendChild(div);
            });
            showScreen('rewardsScreen');
        }
    </script>
</body>
</html>
