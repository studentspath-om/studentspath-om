<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محطة الدراسة</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #007bff; font-family: sans-serif; }
        .container { text-align: center; width: 90%; display: none; opacity: 0; transition: opacity 0.5s ease; }
        .active { display: block; opacity: 1; }
        h1 { color: white; }
        .btn { background-color: yellow; color: black; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; width: 80%; max-width: 300px; display: block; margin-left: auto; margin-right: auto; }
        .back-btn { background-color: #ffcccc; margin-top: 20px; }
        .timer-display { color: white; font-size: 3rem; margin: 10px; }
        input { width: 60px; padding: 8px; font-size: 1rem; text-align: center; border-radius: 5px; border: none; }
        table { width: 100%; border-collapse: collapse; color: white; margin-top: 20px; font-size: 0.9rem; }
        th, td { border: 1px solid white; padding: 8px; }
        .reward-card { margin: 10px; padding: 10px; border: 2px solid white; border-radius: 10px; display: inline-block; }
        .reward-img { width: 100px; height: 100px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="screen1" class="container active">
        <h1>مرحباً بك في محطة الدراسة!</h1>
        <button class="btn" onclick="showScreen('screen2')">ابدأ</button>
    </div>

    <div id="screen2" class="container">
        <h1>صف كم؟</h1>
        <button class="btn" onclick="setGrade('5-8')">خامس الى ثامن</button>
        <button class="btn" onclick="setGrade('9-10')">تاسع وعاشر</button>
        <button class="btn back-btn" onclick="showScreen('screen1')">رجوع</button>
    </div>

    <div id="subjects-screen" class="container">
        <h1>اختر المادة</h1>
        <div id="sub-list"></div>
        <button class="btn back-btn" onclick="showScreen('screen2')">رجوع</button>
    </div>

    <div id="dashboard" class="container">
        <h1 id="currentSubjectTitle"></h1>
        <div style="color: white; margin-bottom: 10px;">دروس المعلم: 
            <input type="number" id="teacherLessonsInput" onchange="saveTeacherLessons()">
        </div>
        
        <div style="color: white;">ضبط الوقت (دقائق): 
            <input type="number" id="timerInput" value="25" onchange="resetTimer()">
        </div>
        
        <div class="timer-display" id="timer">25:00</div>
        
        <button class="btn" onclick="startTimer()">ابدأ</button>
        <button class="btn" onclick="stopTimer()">إيقاف</button>
        <button class="btn" onclick="resetTimer()">إعادة تعيين</button>
        <br>
        <button class="btn" onclick="addLesson()">1 درس تم الانتهاء منه</button>
        <button class="btn" onclick="updateProgressTable(); showScreen('progress');">التقدم</button>
        <button class="btn" onclick="updateRewardsScreen(); showScreen('rewardsScreen');">الجوائز</button>
        <button class="btn back-btn" onclick="showScreen('subjects-screen')">رجوع</button>
    </div>

    <div id="progress" class="container">
        <h1>مستوى التقدم</h1>
        <table id="progressTable"></table>
        <button class="btn back-btn" onclick="showScreen('dashboard')">رجوع</button>
    </div>

    <div id="rewardsScreen" class="container">
        <h1>الجوائز</h1>
        <div id="rewardsList"></div>
        <button class="btn back-btn" onclick="showScreen('dashboard')">رجوع</button>
    </div>

    <script>
        let currentSubject = "";
        let globalLessons = 0;
        let timerId = null;
        let timeLeft = 25 * 60;
        
        let data = {
            "رياضيات": { mine: 0, teacher: 0 }, "إسلامية": { mine: 0, teacher: 0 },
            "عربي": { mine: 0, teacher: 0 }, "دراسات": { mine: 0, teacher: 0 },
            "علوم": { mine: 0, teacher: 0 }, "إنجليزي": { mine: 0, teacher: 0 },
            "فيزياء": { mine: 0, teacher: 0 }, "كيمياء": { mine: 0, teacher: 0 }, "أحياء": { mine: 0, teacher: 0 }
        };

        const rewards = [
            { name: "triple T", lessonsRequired: 10, image: "https://i.pinimg.com/736x/f1/3b/d2/f13bd27b74291818995a189fcced5693.jpg" },
            { name: "cat", lessonsRequired: 20, image: "https://i.pinimg.com/736x/b2/82/66/b28266e613ba53221b1ca4c8c5cbac04.jpg" },
            { name: "haaland", lessonsRequired: 40, image: "https://i.pinimg.com/736x/d2/8d/72/d28d724a39e65d17b07cd43064047634.jpg" },
            { name: "timebomb", lessonsRequired: 100, image: "https://i.pinimg.com/736x/45/ad/8f/45ad8fdefdc24c2ca7221398c63a0e4c.jpg" }
        ];

        function showScreen(id) {
            document.querySelectorAll('.container').forEach(d => { d.classList.remove('active'); d.style.display = 'none'; });
            let target = document.getElementById(id);
            target.style.display = 'block';
            setTimeout(() => target.classList.add('active'), 50);
        }

        function setGrade(grade) {
            let list = document.getElementById('sub-list'); list.innerHTML = "";
            let subs = (grade === '5-8') ? ["رياضيات", "إسلامية", "عربي", "دراسات", "علوم", "إنجليزي"] : ["رياضيات", "إسلامية", "عربي", "دراسات", "فيزياء", "كيمياء", "أحياء", "إنجليزي"];
            subs.forEach(s => {
                let b = document.createElement('button'); b.className = "btn"; b.innerText = s;
                b.onclick = () => { currentSubject = s; document.getElementById('currentSubjectTitle').innerText = s; document.getElementById('teacherLessonsInput').value = data[s].teacher; showScreen('dashboard'); };
                list.appendChild(b);
            });
            showScreen('subjects-screen');
        }

        function saveTeacherLessons() { data[currentSubject].teacher = document.getElementById('teacherLessonsInput').value; }
        
        function addLesson() { data[currentSubject].mine++; globalLessons++; rewards.forEach(r => { if (globalLessons === r.lessonsRequired) alert("مبروك! فتحت: " + r.name); }); }

        function startTimer() { 
            if(timerId) return;
            timerId = setInterval(() => { 
                timeLeft--; 
                let m = Math.floor(timeLeft/60); 
                let s = (timeLeft%60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = m + ":" + s; 
                if(timeLeft <= 0) { clearInterval(timerId); timerId = null; alert("انتهى الوقت!"); }
            }, 1000); 
        }

        function stopTimer() { clearInterval(timerId); timerId = null; }
        
        function resetTimer() { 
            stopTimer(); 
            timeLeft = document.getElementById('timerInput').value * 60; 
            let m = Math.floor(timeLeft/60);
            document.getElementById('timer').innerText = m + ":00";
        }

        function updateProgressTable() {
            let table = document.getElementById('progressTable');
            table.innerHTML = "<tr><th>المادة</th><th>دروسك</th><th>دروس المعلم</th><th>ملاحظة</th></tr>";
            for (let sub in data) {
                let note = (data[sub].mine < data[sub].teacher) ? "يحتاج دراسة" : "ممتاز";
                table.innerHTML += `<tr><td>${sub}</td><td>${data[sub].mine}</td><td>${data[sub].teacher}</td><td>${note}</td></tr>`;
            }
        }

        function updateRewardsScreen() {
            let list = document.getElementById('rewardsList'); list.innerHTML = "";
            rewards.forEach(r => {
                let div = document.createElement('div'); div.className = "reward-card";
                div.innerHTML = (globalLessons >= r.lessonsRequired) ? `<img src="${r.image}" class="reward-img"><p>${r.name}</p>` : `<p>${r.name} (${r.lessonsRequired})</p>`;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
