<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محطة الدراسة</title>
    <style>
        /* Center everything perfectly */
        body { margin: 0; padding: 0; background-color: #007bff; font-family: sans-serif; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; display: none; width: 100%; padding: 20px; }
        .active { display: block; }
        
        h1 { font-size: 3rem; margin-bottom: 30px; }
        
        /* Click effect transition */
        .btn { background-color: yellow; color: black; border: none; padding: 20px 40px; font-size: 1.5rem; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; min-width: 250px; transition: transform 0.1s ease; }
        .btn:active { transform: scale(0.95); }
        
        .back-btn { background-color: #ffcccc; }
        
        section { margin: 40px 0; padding: 20px; border-top: 4px solid white; }
        .timer-display { font-size: 5rem; margin: 20px; }
        input { width: 100px; padding: 15px; font-size: 1.5rem; text-align: center; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 1.5rem; }
        th, td { border: 2px solid white; padding: 15px; }
        .reward-card { margin: 20px; padding: 20px; border: 3px solid white; border-radius: 20px; display: inline-block; }
        .reward-img { width: 150px; height: 150px; }
    </style>
</head>
<body>

    <div id="screen1" class="container active">
        <h1>مرحباً بك في محطة الدراسة!</h1>
        <button class="btn" onclick="showScreen('screen2')">ابدأ</button>
    </div>

    <div id="screen2" class="container">
        <h1>اختر الصف</h1>
        <button class="btn" onclick="setGrade('5-8')">خامس الى ثامن</button>
        <button class="btn" onclick="setGrade('9-10')">تاسع وعاشر</button>
    </div>

    <div id="subjects-screen" class="container">
        <h1>اختر المادة</h1>
        <div id="sub-list"></div>
        <br><button class="btn back-btn" onclick="showScreen('screen2')">رجوع</button>
    </div>

    <div id="dashboard" class="container">
        <h1 id="currentSubjectTitle"></h1>
        
        <section>
            <h2>المؤقت</h2>
            <div class="timer-display" id="timer">25:00</div>
            <button class="btn" onclick="startTimer()">ابدأ</button>
            <button class="btn" onclick="stopTimer()">إيقاف</button>
            <button class="btn" onclick="resetTimer()">إعادة</button>
            <br><br>ضبط الوقت: <input type="number" id="timerInput" value="25" onchange="resetTimer()">
        </section>

        <section id="lessonArea">
            <h2>الدروس</h2>
            <div style="font-size: 1.5rem;">دروس المعلم: <input type="number" id="teacherLessonsInput" onchange="saveTeacherLessons()"></div>
            <br><button id="lessonBtn" class="btn" style="padding: 40px 80px;" onclick="confirmLesson()">1 درس تم الانتهاء منه</button>
        </section>

        <section>
            <h2>التقدم</h2>
            <button class="btn" onclick="updateProgressTable(); showScreen('progress');">عرض جدول التقدم</button>
        </section>

        <section>
            <h2>الجوائز</h2>
            <button class="btn" onclick="updateRewardsScreen(); showScreen('rewardsScreen');">عرض الجوائز</button>
        </section>

        <button class="btn back-btn" onclick="showScreen('subjects-screen')">رجوع للمواد</button>
    </div>

    <div id="progress" class="container">
        <h1>جدول التقدم</h1>
        <table id="progressTable"></table>
        <br><button class="btn back-btn" onclick="showScreen('dashboard')">رجوع</button>
    </div>

    <div id="rewardsScreen" class="container">
        <h1>الجوائز المكتسبة</h1>
        <div id="rewardsList"></div>
        <br><button class="btn back-btn" onclick="showScreen('dashboard')">رجوع</button>
    </div>

    <script>
        let currentSubject = ""; let globalLessons = 0; let timerId = null; let timeLeft = 25 * 60;
        let data = {}; ["رياضيات", "إسلامية", "عربي", "دراسات", "علوم", "إنجليزي", "فيزياء", "كيمياء", "أحياء"].forEach(s => data[s] = { mine: 0, teacher: 0 });
        const rewards = [
            { name: "triple T", lessonsRequired: 10, image: "https://i.pinimg.com/736x/f1/3b/d2/f13bd27b74291818995a189fcced5693.jpg" }, 
            { name: "cat", lessonsRequired: 20, image: "https://i.pinimg.com/736x/b2/82/66/b28266e613ba53221b1ca4c8c5cbac04.jpg" }, 
            { name: "haaland", lessonsRequired: 40, image: "https://i.pinimg.com/736x/d2/8d/72/d28d724a39e65d17b07cd43064047634.jpg" },
            { name: "timebomb", lessonsRequired: 100, image: "https://i.pinimg.com/736x/45/ad/8f/45ad8fdefdc24c2ca7221398c63a0e4c.jpg" }
        ];

        function showScreen(id) { document.querySelectorAll('.container').forEach(d => { d.classList.remove('active'); d.style.display = 'none'; }); let target = document.getElementById(id); target.style.display = 'block'; setTimeout(() => target.classList.add('active'), 50); }
        function setGrade(grade) { let list = document.getElementById('sub-list'); list.innerHTML = ""; let all = {"5-8": ["رياضيات", "إسلامية", "عربي", "دراسات", "علوم", "إنجليزي"], "9-10": ["رياضيات", "إسلامية", "عربي", "دراسات", "فيزياء", "كيمياء", "أحياء", "إنجليزي"]}; all[grade].forEach(s => { let b = document.createElement('button'); b.className = "btn"; b.innerText = s; b.onclick = () => { currentSubject = s; document.getElementById('currentSubjectTitle').innerText = s; document.getElementById('teacherLessonsInput').value = data[s].teacher; showScreen('dashboard'); }; list.appendChild(b); }); showScreen('subjects-screen'); }
        function confirmLesson() { document.getElementById('lessonArea').innerHTML = `<h2>هل انت متأكد أنك أنهيت درساً واحداً؟</h2><button class="btn" style="background:green; color:white" onclick="completeLesson(true)">نعم</button><button class="btn back-btn" onclick="completeLesson(false)">لا</button>`; }
        function completeLesson(yes) { if(yes) { data[currentSubject].mine++; globalLessons++; alert("تم التسجيل!"); } document.getElementById('lessonArea').innerHTML = `<h2>الدروس</h2><div style="font-size: 1.5rem;">دروس المعلم: <input type="number" id="teacherLessonsInput" value="${data[currentSubject].teacher}" onchange="saveTeacherLessons()"></div><br><button id="lessonBtn" class="btn" style="padding: 40px 80px;" onclick="confirmLesson()">1 درس تم الانتهاء منه</button>`; }
        function startTimer() { if(!timerId) timerId = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = Math.floor(timeLeft/60) + ":" + (timeLeft%60).toString().padStart(2, '0'); if(timeLeft <= 0) { clearInterval(timerId); timerId = null; alert("انتهى الوقت!"); } }, 1000); }
        function stopTimer() { clearInterval(timerId); timerId = null; }
        function resetTimer() { stopTimer(); timeLeft = document.getElementById('timerInput').value * 60; document.getElementById('timer').innerText = document.getElementById('timerInput').value + ":00"; }
        function saveTeacherLessons() { data[currentSubject].teacher = document.getElementById('teacherLessonsInput').value; }
        function updateProgressTable() { let table = document.getElementById('progressTable'); table.innerHTML = "<tr><th>المادة</th><th>دروسك</th><th>دروس المعلم</th><th>حالة</th></tr>"; for (let sub in data) { let note = (data[sub].mine < data[sub].teacher) ? "يحتاج" : "ممتاز"; table.innerHTML += `<tr><td>${sub}</td><td>${data[sub].mine}</td><td>${data[sub].teacher}</td><td>${note}</td></tr>`; } }
        function updateRewardsScreen() { let list = document.getElementById('rewardsList'); list.innerHTML = ""; rewards.forEach(r => { let div = document.createElement('div'); div.className = "reward-card"; div.innerHTML = (globalLessons >= r.lessonsRequired) ? `<img src="${r.image}" class="reward-img"><p>${r.name}</p>` : `<p>${r.name} (${r.lessonsRequired})</p>`; list.appendChild(div); }); }
    </script>
</body>
</html>
